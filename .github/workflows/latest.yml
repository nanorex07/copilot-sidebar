name: Latest Release (Rolling)

on:
  push:
    branches:
      - main

jobs:
  latest-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Extension
        run: npm run build

      - name: Zip Dist Directory
        run: zip -r copilot-sidebar-latest.zip dist/

      - name: Update Latest Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: latest
          name: "Latest Sidebar Build (Main)"
          body: |
            This is an automated build of the latest code from the `main` branch.
            Last updated: ${{ github.event.head_commit.timestamp }}
            Commit: ${{ github.sha }}
          files: copilot-sidebar-latest.zip
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
